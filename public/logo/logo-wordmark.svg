<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="ssGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- SS Monogram Mark -->
  <g transform="translate(10, 20)">
    <!-- First S -->
    <path d="M10 10 C10 0, 30 0, 30 12 C30 24, 10 20, 10 34 C10 48, 30 50, 30 40"
          fill="none" stroke="url(#ssGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Second S -->
    <path d="M30 10 C30 0, 50 0, 50 12 C50 24, 30 20, 30 34 C30 48, 50 50, 50 40"
          fill="none" stroke="url(#ssGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(75, 38)">
    <!-- S&S -->
    <text x="0" y="0" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#0F172A" letter-spacing="-0.02em">S</text>
    <text x="38" y="-4" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="300" fill="#0EA5E9" letter-spacing="-0.01em">&amp;</text>
    <text x="58" y="0" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#0F172A" letter-spacing="-0.02em">S</text>
    <!-- Studio -->
    <text x="96" y="14" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#64748B" letter-spacing="0.08em" text-transform="uppercase">STUDIO</text>
  </g>
</svg>
